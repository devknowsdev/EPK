<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery — Dave Knowles</title>
<link rel="stylesheet" href="styles.css">
<style>
  .gallery-full {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 32px 120px;
  }
  .gallery-full .section-label { margin-bottom: 32px; display: block; }
  .gallery-full-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }
  .gallery-full-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    filter: brightness(0.85) sepia(0.15);
    transition: filter 0.3s;
  }
  .gallery-full-grid img:hover { filter: brightness(1) sepia(0); }
  .back-link {
    display: inline-block;
    margin-bottom: 40px;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--brass);
    text-decoration: none;
  }
  @media (max-width: 640px) {
    .gallery-full { padding: 40px 16px 80px; }
    .gallery-full-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="gallery-full">
    <a class="back-link" href="index.html">← Back to EPK</a>
    <span class="section-label">Gallery</span>
    <div class="gallery-full-grid" id="grid"></div>
</div>

<script>
async function load() {
    const res = await fetch('data/epk.json');
    const data = await res.json();
    const galleryBlock = data.layout.find(b => b.type === 'gallery');
    const photos = galleryBlock ? data.content[galleryBlock.id] : [];
    document.getElementById("grid").innerHTML =
        photos.map(g => `<img src="${g.src}" alt="Dave Knowles">`).join("");
}
load();
</script>
</body>
</html>
