<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photos — Dave Knowles</title>
<meta name="epk:dataset" content="data/epk.json">
<meta name="epk:page" content="gallery">
<link rel="stylesheet" href="styles.css">
</head>
<body data-epk-page="gallery">
<div class="gallery-full">
    <a class="back-link" href="index.html">← Back to EPK</a>
    <span class="section-label">All Photos</span>
    <div class="gallery-full-grid" id="grid"></div>
</div>
<script>
async function load() {
    const res = await fetch('data/epk.json');
    const data = await res.json();
    document.getElementById("grid").innerHTML =
        data.gallery.map(g => `<img src="${g.src}" alt="${g.caption || 'Dave Knowles'}" title="${g.caption || ''}">`).join("");
}
load();
</script>
</body>
</html>
