<!DOCTYPE html>

<head>

<link rel="stylesheet" href="../styles.css">

<body>
<div id="app"></div>
<script>
window.__EPK_PUBLIC_BASE__ = '../';
(function(){
  const nativeFetch = window.fetch.bind(window);
  window.fetch = function epkPathFetch(input, init){
    if (typeof input === 'string') {
      if (input === '/data/epk.json') return nativeFetch('../data/epk.json', init);
      if (input.startsWith('/published/')) return nativeFetch('..' + input, init);
    }
    return nativeFetch(input, init);
  };
})();
</script>
<script src="../app.js"></script>
<script src="../public-empty-cta.js"></script>
<script src="../public-clean.js"></script>
<script src="../public-media-contact.js"></script>
</body>
