<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPK OS — Admin</title>
<style>
:root{--bg:#1E1F1C;--surface:#2A2B27;--surface2:#242520;--border:rgba(122,158,128,.18);--border-hi:rgba(122,158,128,.38);--text:#EDEEE8;--text2:#B8BFAD;--muted:#7A8070;--brass:#7A9E80;--brass-lt:#9DC4A4;--brass-bg:rgba(122,158,128,.10);--brass-border:rgba(122,158,128,.30);--green:#7abf7a;--green-bg:rgba(122,191,122,.10);--green-border:rgba(122,191,122,.35);--red:#c47a7a;--red-bg:rgba(196,122,122,.10);--red-border:rgba(196,122,122,.35);--blue:#7AA8C4;--blue-bg:rgba(122,168,196,.10);--blue-border:rgba(122,168,196,.30);--radius:4px;--rule:rgba(122,158,128,.22)}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:var(--bg);color:var(--text);font:13px/1.45 Inter,system-ui,sans-serif;overflow:hidden}button,input,textarea,select{font:inherit}button{cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);padding:5px 9px}button:hover{border-color:var(--brass-border);color:var(--brass-lt)}input,textarea,select{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;outline:none}input:focus,textarea:focus{border-color:var(--brass)}textarea{resize:vertical}.hidden{display:none!important}.muted{color:var(--muted)}
.top-bar{height:48px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px}.brand{font-weight:700;white-space:nowrap}.brand-sub{font-weight:400;color:var(--muted);margin-left:5px}.mode-tabs{flex:1;display:flex;gap:3px;overflow:auto}.mtab{display:flex;align-items:center;border:1px solid transparent;border-radius:var(--radius);white-space:nowrap}.mtab:hover,.mtab.active{background:var(--brass-bg);border-color:var(--brass-border)}.mtab-label{padding:5px 8px;cursor:pointer}.mtab-actions{opacity:0;display:flex;gap:2px;padding-right:4px}.mtab:hover .mtab-actions{opacity:1}.mtab-actions button,.mtab-actions a{font-size:.75rem;padding:2px 4px;text-decoration:none;color:var(--text2)}.mode-dot,.dirty-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:5px}.top-actions{display:flex;gap:6px}.top-actions button.active,#publish-btn{background:var(--brass-bg);border-color:var(--brass-border);color:var(--brass-lt)}
.layout{height:calc(100vh - 48px);display:flex;position:relative}.canvas{flex:1;overflow:auto;padding:16px;transition:margin-right .2s}.canvas.library-open{margin-right:320px}.preview-pane{width:420px;border-left:1px solid var(--border);background:#fff}.preview-pane iframe{width:100%;height:100%;border:0}.block{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden}.block.dragging{opacity:.45}.block-header{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer}.block-header:hover{background:var(--brass-bg)}.grip{cursor:grab;color:var(--muted)}.block-label{font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);flex:1}.block-controls{display:flex;gap:4px}.block-controls button{font-size:.72rem;padding:2px 7px}.block-controls .rm{border-color:var(--red-border);color:var(--red)}.block-body{padding:11px}.hero-row{display:flex;gap:12px}.hero-thumb{width:82px;height:54px;object-fit:cover;border:1px solid var(--border);border-radius:3px}.hero-fields{flex:1;display:grid;gap:6px}.hero-path{color:var(--muted);font-size:.75rem;word-break:break-all}.pill-row{display:flex;gap:5px;margin-bottom:8px}.pill.active{background:var(--brass-bg);border-color:var(--brass);color:var(--brass-lt)}.toggle-row{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--rule);padding:6px 0}.toggle-row:last-child{border-bottom:0}.switch{width:32px;height:17px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);position:relative;flex:0 0 auto}.switch:before{content:"";position:absolute;width:11px;height:11px;border-radius:50%;left:2px;top:2px;background:var(--muted)}.switch.on{background:var(--green-bg);border-color:var(--green-border)}.switch.on:before{transform:translateX(15px);background:var(--green)}.row-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tags{display:flex;gap:3px;flex-wrap:wrap}.tag{font-size:.68rem;color:var(--muted);border:1px solid var(--border);padding:1px 5px;border-radius:20px}.mini{margin:6px 0 8px 40px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:9px;display:grid;gap:6px}.mini label{color:var(--muted);font-size:.72rem}.gstrip,.picker-grid,.photo-grid{display:grid;gap:5px}.gstrip{grid-template-columns:repeat(auto-fill,48px)}.gthumb{position:relative}.gthumb img{width:48px;height:48px;object-fit:cover;border-radius:3px;border:1px solid var(--border)}.gthumb button{position:absolute;right:-4px;top:-4px;border-radius:50%;padding:0;width:16px;height:16px;background:var(--red);color:white;border:0}.inactive-pool{border:1px dashed var(--border);border-radius:6px;padding:12px;margin-top:14px;background:var(--surface2)}.inactive-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}.ichip{background:var(--brass-bg);border-color:var(--brass-border);color:var(--brass-lt)}
.library-panel{position:absolute;right:0;top:0;bottom:0;width:320px;background:var(--surface2);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:30}.lib-head{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:1px solid var(--border)}.lib-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border-bottom:1px solid var(--border)}.lib-tabs button.active{background:var(--brass-bg);color:var(--brass-lt);border-color:var(--brass-border)}.lib-body{padding:12px;overflow:auto;display:grid;gap:8px}.lib-item{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:7px}.photo-grid{grid-template-columns:repeat(4,1fr)}.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:3px;border:1px solid var(--border)}
.modal,.picker{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:flex;align-items:center;justify-content:center}.panel{width:min(620px,92vw);max-height:82vh;overflow:auto;background:var(--surface);border:1px solid var(--border-hi);border-radius:8px}.panel-head{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid var(--border)}.panel-body{padding:15px;display:grid;gap:12px}.picker-grid{grid-template-columns:repeat(6,1fr)}.pick{position:relative;border:2px solid transparent;border-radius:4px;overflow:hidden;aspect-ratio:1}.pick.selected{border-color:var(--brass)}.pick img{width:100%;height:100%;object-fit:cover}.check{position:absolute;right:4px;top:4px;background:var(--brass);color:var(--bg);border-radius:50%;width:18px;height:18px;display:grid;place-items:center;font-weight:700}.status{padding:8px;border-radius:4px}.status.success{background:var(--green-bg);border:1px solid var(--green-border)}.status.error{background:var(--red-bg);border:1px solid var(--red-border)}.status.loading{background:var(--blue-bg);border:1px solid var(--blue-border)}
</style>
</head>
<body>
<header class="top-bar"><span class="brand">EPK OS <span class="brand-sub">Dave Knowles</span></span><nav class="mode-tabs" id="mode-tabs"></nav><div class="top-actions"><button id="undo-btn">↩ Undo</button><button id="library-btn">Library</button><button id="preview-btn">Preview</button><button id="publish-btn">Publish ↑<span id="dirty-dot" class="dirty-dot hidden"></span></button></div></header>
<main class="layout" id="layout"><div class="canvas" id="canvas"></div><div class="library-panel hidden" id="library-panel"><div class="lib-head"><strong>Library</strong><button id="close-lib">✕</button></div><div class="lib-tabs" id="lib-tabs"></div><div class="lib-body" id="lib-body"></div></div><div class="preview-pane hidden" id="preview-pane"><iframe id="preview-frame" src="about:blank"></iframe></div></main>
<div id="picker" class="picker hidden"><div class="panel"><div class="panel-head"><strong id="picker-title">Pick photo</strong><button onclick="closePicker()">✕</button></div><div class="panel-body"><div class="picker-grid" id="picker-grid"></div></div></div></div>
<div id="publish-modal" class="modal hidden"><div class="panel"><div class="panel-head"><strong>Publish to GitHub</strong><button onclick="closePublish()">✕</button></div><div class="panel-body"><p class="muted">This updates <code>EPK/public/data/epk.json</code>. Use this only after reviewing the JSON and preview.</p><div id="publish-summary"></div><label>GitHub user<input id="gh-user" value="devknowsdev"></label><label>Repo<input id="gh-repo" value="EPK"></label><label>Path<input id="gh-path" value="EPK/public/data/epk.json"></label><label>Token<input id="gh-token" type="password" autocomplete="off"></label><div style="display:flex;gap:8px"><button onclick="downloadJSON()">Backup JSON</button><button onclick="doPublish()" id="do-publish">Publish now</button></div><div id="publish-status"></div></div></div></div>
<script>
let db={},loadedDb={},history=[],activeMode='default',dirty=false,libraryOpen=false,libraryTab='videos',previewOpen=false,collapsedBlocks={},openEditor='',pickerMode=null;
const SECTIONS=['bio','offerings','videos','releases','credits','gallery','contact'];
const LABELS={hero:'Hero',bio:'Biography',offerings:'Offerings',videos:'Videos',releases:'Releases',credits:'Credits',gallery:'Gallery',contact:'Contact'};
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function val(id){return ($(id)?.value||'').trim();}
function assetSrc(p){if(!p)return'';return /^https?:/.test(p)?p:'../public/'+String(p).replace(/^\/+/, '');}
function publicURLForMode(k){return k==='default'?'../public/':`../public/?for=${encodeURIComponent(k)}`;}
function clone(o){return JSON.parse(JSON.stringify(o));}
function pushHistory(){history.push(JSON.stringify(db));if(history.length>20)history.shift();}
function markDirty(){dirty=true;updateDirty();if(previewOpen)updatePreview();renderModeTabs();}
function updateDirty(){$('dirty-dot').classList.toggle('hidden',!dirty);}
function modeIsDirty(k){return JSON.stringify(db.modes?.[k]||{})!==JSON.stringify(loadedDb.modes?.[k]||{});}
function migrateGalleryCount(){let changed=false;Object.values(db.modes||{}).forEach(m=>{if(!m.galleryPhotos&&m.galleryCount!=null){m.galleryPhotos=(db.gallery||[]).slice(0,m.galleryCount).map(g=>g.src);delete m.galleryCount;changed=true;}});return changed;}
function undo(){const last=history.pop();if(!last)return;db=JSON.parse(last);dirty=true;renderAll();}
function renderAll(){renderModeTabs();renderCanvas();renderLibrary();updateDirty();if(previewOpen)updatePreview();}
function renderModeTabs(){const nav=$('mode-tabs');nav.innerHTML=Object.entries(db.modes||{}).map(([k,m])=>`<div class="mtab ${k===activeMode?'active':''}"><span class="mtab-label" onclick="switchMode('${k}')">${esc(m.label||k)}${modeIsDirty(k)?'<span class="mode-dot"></span>':''}</span><span class="mtab-actions"><button onclick="copyModeURL('${publicURLForMode(k)}')">⎘</button><a href="${publicURLForMode(k)}" target="_blank">↗</a></span></div>`).join('');}
function switchMode(k){activeMode=k;renderCanvas();renderModeTabs();if(previewOpen)updatePreview();}
async function copyModeURL(url){await navigator.clipboard?.writeText(new URL(url,location.href).href);toast('Mode link copied');}
function block(section,body,controls=''){const key=activeMode+':'+section,collapsed=!!collapsedBlocks[key];return `<section class="block ${collapsed?'collapsed':''}" data-section="${section}" draggable="${section!=='hero'}"><div class="block-header" onclick="toggleCollapse('${key}')"><span class="grip">${section==='hero'?'':'⠿'}</span><span class="block-label">${LABELS[section]}</span><span class="block-controls" onclick="event.stopPropagation()">${controls}${section!=='hero'?`<button class="rm" onclick="removeSection('${section}')">×</button>`:''}</span><span>${collapsed?'▸':'▾'}</span></div><div class="block-body ${collapsed?'hidden':''}">${body}</div></section>`;}
function toggleCollapse(k){collapsedBlocks[k]=!collapsedBlocks[k];sessionStorage.setItem('epk-collapsed',JSON.stringify(collapsedBlocks));renderCanvas();}
function renderCanvas(){const m=db.modes?.[activeMode];if(!m)return;const sections=m.sections||[];const inactive=SECTIONS.filter(s=>!sections.includes(s));$('canvas').innerHTML=renderHero()+sections.map(renderBlock).join('')+renderInactivePool(inactive);initBlockDrag();initThumbDrag();}
function renderBlock(s){return {bio:renderBio,offerings:()=>renderList('offerings'),videos:()=>renderList('videos'),releases:()=>renderList('releases'),credits:()=>renderList('credits'),gallery:renderGallery,contact:renderContact}[s]?.()||'';}
function renderHero(){const m=db.modes[activeMode];return block('hero',`<div class="hero-row"><img class="hero-thumb" src="${assetSrc(m.hero)}"><div class="hero-fields"><div class="hero-path">${esc(m.hero||'No photo set')}</div><input value="${esc(m.heroCaption||'')}" placeholder="Caption" oninput="db.modes['${activeMode}'].heroCaption=this.value;markDirty()"><button class="pick-btn" onclick="openPicker('hero')">+ pick photo</button></div></div>`,'');}
function renderBio(){const style=db.modes[activeMode].bioStyle||'short';const text=style==='full'?(db.bio?.full||[]).join('\n\n'):(db.bio?.[style]||'');return block('bio',`<div class="pill-row">${['short','acoustic','full'].map(v=>`<button class="pill ${v===style?'active':''}" onclick="setBio('${v}')">${v}</button>`).join('')}</div><textarea rows="6" onblur="saveBio('${style}',this.value)">${esc(text)}</textarea>`);}
function setBio(v){pushHistory();db.modes[activeMode].bioStyle=v;markDirty();renderCanvas();}
function saveBio(style,text){pushHistory();db.bio=db.bio||{};db.bio[style]=style==='full'?text.split(/\n\n+/).map(p=>p.trim()).filter(Boolean):text;markDirty();}
function renderList(type){const arr=db[type]||[];const control=`<button onclick="addItem('${type}')">+ Add</button>`;const rows=arr.map((it,i)=>rowFor(type,it,i)).join('')||'<p class="muted">No items yet.</p>';return block(type,rows,control);}
function rowFor(type,it,i){const on=isOn(type,it);const title=it.title||it.role||'Untitled';const icon=type==='videos'?'▶':type==='releases'?'♪':type==='credits'?(it.year||'•'):'•';return `<div class="toggle-row"><button class="switch ${on?'on':''}" onclick="toggleItem('${type}',${i})"></button><span class="muted">${esc(icon)}</span><span class="row-title">${esc(title)}</span><span class="tags">${(it.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</span><button onclick="editItem('${type}',${i})">✎</button></div>${openEditor===type+':'+i?miniForm(type,it,i):''}`;}
function modeTags(type){return type==='offerings'?'offeringTags':type==='videos'?'videoTags':'tags';}
function isOn(type,it){if(type==='credits')return (it.tags||[]).some(t=>['film','press',activeMode].includes(t));if(type==='releases')return true;const tags=db.modes[activeMode]?.[modeTags(type)]||[];return (it.tags||[]).some(t=>tags.includes(t));}
function toggleItem(type,i){pushHistory();const it=db[type][i];if(type==='releases')return;const tag=activeMode;it.tags=it.tags||[];if(isOn(type,it))it.tags=it.tags.filter(t=>t!==tag);else{if(!it.tags.includes(tag))it.tags.push(tag);const key=modeTags(type);db.modes[activeMode][key]=db.modes[activeMode][key]||[];if(!db.modes[activeMode][key].includes(tag))db.modes[activeMode][key].push(tag);}markDirty();renderCanvas();}
function editItem(t,i){openEditor=openEditor===t+':'+i?'':t+':'+i;renderCanvas();}
function miniForm(type,it,i){return `<div class="mini"><label>Title<input id="mf-title" value="${esc(it.title||'')}"></label>${type==='credits'?`<label>Year<input id="mf-year" value="${esc(it.year||'')}"></label><label>Role<input id="mf-role" value="${esc(it.role||'')}"></label>`:''}${type==='releases'?`<label>Alias<input id="mf-alias" value="${esc(it.alias||'')}"></label>`:''}${type!=='offerings'?`<label>URL<input id="mf-url" value="${esc(it.url||it.link||'')}"></label>`:''}<label>Description<textarea id="mf-desc" rows="3">${esc(it.description||'')}</textarea></label><label>Tags<input id="mf-tags" value="${esc((it.tags||[]).join(', '))}"></label><div><button onclick="saveItem('${type}',${i})">Save</button><button onclick="deleteItem('${type}',${i})">Delete</button></div></div>`;}
function saveItem(type,i){pushHistory();const it=db[type][i];it.title=val('mf-title');it.description=val('mf-desc');it.tags=val('mf-tags').split(',').map(s=>s.trim()).filter(Boolean);if(type==='credits'){it.year=val('mf-year');it.role=val('mf-role');it.link=val('mf-url');}else if(type==='releases'){it.alias=val('mf-alias');it.url=val('mf-url');}else if(type==='videos'){it.url=val('mf-url');}openEditor='';markDirty();renderCanvas();}
function addItem(type){pushHistory();db[type]=db[type]||[];db[type].push({title:'New item',description:'',url:'',tags:[activeMode]});openEditor=type+':'+(db[type].length-1);markDirty();renderCanvas();}
function deleteItem(type,i){pushHistory();db[type].splice(i,1);openEditor='';markDirty();renderCanvas();}
function renderGallery(){const m=db.modes[activeMode];const photos=m.galleryPhotos||[];return block('gallery',`<div class="gstrip">${photos.map((src,i)=>`<div class="gthumb" draggable="true" data-i="${i}"><img src="${assetSrc(src)}"><button onclick="removePhoto(${i})">×</button></div>`).join('')||'<span class="muted">No photos selected</span>'}</div><p><button onclick="openPicker('gallery')">+ pick from photos</button></p>`,`<button onclick="openPicker('gallery')">+ Add</button>`);}
function removePhoto(i){pushHistory();db.modes[activeMode].galleryPhotos.splice(i,1);markDirty();renderCanvas();}
function renderContact(){const m=db.meta||{};return block('contact',`<p>Email: ${esc(m.email||'')}</p><p>Phone: ${esc(m.phone||'')}</p><p>Website: ${esc(m.website||'')}</p><p class="muted">Profile fields are edited in Library → Profile.</p><button onclick="openLibrary('profile')">Edit profile →</button>`);}
function renderInactivePool(inactive){return inactive.length?`<div class="inactive-pool"><strong class="muted">Not on this page</strong><div class="inactive-chips">${inactive.map(s=>`<button class="ichip" onclick="addSection('${s}')">+ ${LABELS[s]}</button>`).join('')}</div></div>`:'';}
function addSection(s){pushHistory();db.modes[activeMode].sections=db.modes[activeMode].sections||[];db.modes[activeMode].sections.push(s);markDirty();renderCanvas();}
function removeSection(s){pushHistory();db.modes[activeMode].sections=(db.modes[activeMode].sections||[]).filter(x=>x!==s);markDirty();renderCanvas();}
function initBlockDrag(){let src=null;$('canvas').querySelectorAll('.block[draggable="true"]').forEach(b=>{b.ondragstart=e=>{src=b;b.classList.add('dragging')};b.ondragover=e=>{e.preventDefault();const after=[...$('canvas').querySelectorAll('.block[draggable="true"]')].find(x=>e.clientY<x.getBoundingClientRect().top+x.offsetHeight/2);if(after)$('canvas').insertBefore(src,after);else $('canvas').appendChild(src)};b.ondragend=()=>{src?.classList.remove('dragging');db.modes[activeMode].sections=[...$('canvas').querySelectorAll('.block[draggable="true"]')].map(x=>x.dataset.section);markDirty();};});}
function initThumbDrag(){let from=null;$('canvas').querySelectorAll('.gthumb').forEach(t=>{t.ondragstart=()=>from=+t.dataset.i;t.ondragover=e=>e.preventDefault();t.ondrop=()=>{const to=+t.dataset.i;if(from===null||from===to)return;pushHistory();const a=db.modes[activeMode].galleryPhotos;const [x]=a.splice(from,1);a.splice(to,0,x);markDirty();renderCanvas();};});}
function openPicker(mode){pickerMode=mode;renderPicker();$('picker').classList.remove('hidden');}
function closePicker(){$('picker').classList.add('hidden');}
function renderPicker(){const selected=pickerMode==='hero'?[db.modes[activeMode].hero]:(db.modes[activeMode].galleryPhotos||[]);$('picker-title').textContent=pickerMode==='hero'?'Pick hero photo':'Pick gallery photos';$('picker-grid').innerHTML=(db.gallery||[]).map(g=>`<div class="pick ${selected.includes(g.src)?'selected':''}" onclick="pickPhoto('${esc(g.src)}')"><img src="${assetSrc(g.src)}">${selected.includes(g.src)?'<span class="check">✓</span>':''}</div>`).join('');}
function pickPhoto(src){pushHistory();const m=db.modes[activeMode];if(pickerMode==='hero'){m.hero=src;closePicker();}else{m.galleryPhotos=m.galleryPhotos||[];const i=m.galleryPhotos.indexOf(src);if(i>=0)m.galleryPhotos.splice(i,1);else m.galleryPhotos.push(src);renderPicker();}markDirty();renderCanvas();}
function openLibrary(tab='videos'){libraryOpen=true;libraryTab=tab;$('library-panel').classList.remove('hidden');$('canvas').classList.add('library-open');renderLibrary();}
function closeLibrary(){libraryOpen=false;$('library-panel').classList.add('hidden');$('canvas').classList.remove('library-open');}
function renderLibrary(){if(!libraryOpen)return;$('lib-tabs').innerHTML=['profile','bio','offerings','videos','releases','credits','photos'].map(t=>`<button class="${t===libraryTab?'active':''}" onclick="libraryTab='${t}';renderLibrary()">${t}</button>`).join('');let h='';if(libraryTab==='profile'){const m=db.meta||{};h=`<label>Name<input id="meta-name" value="${esc(m.name||'')}"></label><label>Tagline<input id="meta-tagline" value="${esc(m.tagline||'')}"></label><label>Location<input id="meta-location" value="${esc(m.location||'')}"></label><label>Email<input id="meta-email" value="${esc(m.email||'')}"></label><label>Phone<input id="meta-phone" value="${esc(m.phone||'')}"></label><label>Website<input id="meta-website" value="${esc(m.website||'')}"></label><button onclick="saveProfile()">Save profile</button>`;}else if(libraryTab==='bio'){h=`<p class="muted">Use the Biography block on a page to edit the active variant.</p>`;}else if(libraryTab==='photos'){h=`<div class="photo-grid">${(db.gallery||[]).map(g=>`<div><img src="${assetSrc(g.src)}"><small>${esc(g.caption||g.src)}</small></div>`).join('')}</div>`;}else{h=(db[libraryTab]||[]).map((x,i)=>`<div class="lib-item"><strong>${esc(x.title||x.role||'Untitled')}</strong><p class="muted">${esc((x.tags||[]).join(', '))}</p></div>`).join('')||'<p class="muted">No items.</p>'}$('lib-body').innerHTML=h;}
function saveProfile(){pushHistory();db.meta.name=val('meta-name');db.meta.tagline=val('meta-tagline');db.meta.location=val('meta-location');db.meta.email=val('meta-email');db.meta.phone=val('meta-phone');db.meta.website=val('meta-website');markDirty();renderCanvas();toast('Profile saved');}
function togglePreview(){previewOpen=!previewOpen;$('preview-pane').classList.toggle('hidden',!previewOpen);$('preview-btn').classList.toggle('active',previewOpen);if(previewOpen)updatePreview();}
function updatePreview(){
  const baseHref = new URL('../public/', location.href).href;
  const previewMode = activeMode;
  const html = `<!doctype html>
<html>
<head>
<base href="${baseHref}">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>
<script>
window.__EPK_SNAPSHOT__=${JSON.stringify(db)};
window.__EPK_PREVIEW_MODE__='${previewMode}';

async function doPublish(){['user','repo','path','token'].forEach(k=>localStorage.setItem('gh-'+k,val('gh-'+k)));const user=val('gh-user'),repo=val('gh-repo'),path=val('gh-path'),token=val('gh-token');if(!token)return status('error','No GitHub token.');status('loading','Publishing…');try{const api=`https://api.github.com/repos/${user}/${repo}/contents/${path}`;const headers={Authorization:`token ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'};const old=await fetch(api,{headers});const existing=old.ok?await old.json():null;const content=btoa(unescape(encodeURIComponent(JSON.stringify(db,null,2))));const now=new Date().toLocaleString('en-ZA',{timeZone:'Africa/Johannesburg'});const res=await fetch(api,{method:'PUT',headers,body:JSON.stringify({message:`EPK update — ${now}`,content,...(existing?.sha?{sha:existing.sha}:{})})});if(!res.ok)throw new Error((await res.json()).message||res.status);loadedDb=clone(db);dirty=false;updateDirty();status('success','✓ Published. Cloudflare may redeploy shortly.');}catch(e){status('error','Failed: '+e.message);}}
